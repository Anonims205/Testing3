<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOJO SATORU - HOLLOW PURPLE: DOMAIN EXPANSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Roboto+Mono:wght@300&display=swap');
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
        }
        
        /* Video background dengan efek minimal */
        #webcam { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            opacity: 0.9;
            z-index: 0; 
            filter: grayscale(20%) contrast(110%) brightness(100%);
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            transform: scaleX(-1); 
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            z-index: 20;
            text-shadow: 0 0 20px #A020F0, 0 0 40px #0000FF;
            animation: pulse 2s infinite;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 2px solid #A020F0;
            white-space: nowrap;
        }
        
        #status {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            z-index: 15;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(160, 32, 240, 0.5);
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(160,32,240,0.3);
        }
        
        #status span {
            color: #A020F0;
            font-weight: bold;
            text-shadow: 0 0 15px #A020F0;
            animation: blink 1.5s infinite;
        }
        
        .glow-text {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            z-index: 15;
            text-align: right;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.8));
            padding: 20px 35px;
            border-radius: 0 0 0 30px;
            border-left: 4px solid #A020F0;
            border-bottom: 2px solid #A020F0;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(160,32,240,0.3);
        }
        
        .glow-text h1 {
            margin: 0;
            font-size: 42px;
            color: #fff;
            text-shadow: 0 0 20px #A020F0, 0 0 40px #0000FF;
            letter-spacing: 6px;
            line-height: 1.2;
        }
        
        .glow-text p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 14px;
            color: #fff;
            text-shadow: 0 0 10px #A020F0;
        }
        
        #cam-quality {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #0f0;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            z-index: 15;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            pointer-events: none;
        }
        
        .green-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse-green 2s infinite;
        }
        
        /* Hand gesture guide */
        .gesture-guide {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 15;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 1px solid #A020F0;
            color: white;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            align-items: center;
        }
        
        .gesture-icon {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .gesture-icon span {
            background: rgba(160,32,240,0.3);
            padding: 5px 12px;
            border-radius: 25px;
            border: 1px solid #A020F0;
        }
        
        @keyframes pulse {
            0% { opacity: 1; text-shadow: 0 0 20px #A020F0, 0 0 40px #0000FF; }
            50% { opacity: 0.7; text-shadow: 0 0 40px #FF0000, 0 0 80px #A020F0; }
            100% { opacity: 1; text-shadow: 0 0 20px #A020F0, 0 0 40px #0000FF; }
        }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0,255,0,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0,255,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,0,0); }
        }
    </style>
</head>
<body>

    <div id="loading">🔮 ACTIVATING CURSED ENERGY 🔮</div>
    
    <div class="glow-text">
        <h1>HOLLOW PURPLE</h1>
        <p>∞ IMAGINARY TECHNIQUE: VOID ∞</p>
    </div>
    
    <div id="cam-quality">
        <span class="green-dot"></span> CAMERA ACTIVE
    </div>
    
    <div id="status">
        <span>◉</span> BRING FINGERS TOGETHER TO CREATE HOLLOW PURPLE
    </div>
    
    <div class="gesture-guide">
        <div class="gesture-icon">
            <span>👆+👆</span> = CREATE
        </div>
        <div class="gesture-icon">
            <span>✋</span> = RELEASE
        </div>
    </div>
    
    <video id="webcam" playsinline autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { EffectComposer } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js';
        import { FilesetResolver, HandLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0';

        // --- KONFIGURASI ---
        const CONFIG = {
            redColor: 0xFF3366,
            blueColor: 0x3366FF,
            purpleColor: 0xAA44FF,
            mergeDistance: 0.18,
            particleCount: 1500,
            auraParticleCount: 800,
            explosionParticles: 5000
        };

        // --- STATE ---
        let handLandmarker = null;
        let webcamRunning = false;
        let lastVideoTime = -1;
        let redSphere, blueSphere, purpleSphere, purpleAura, purpleExplosion;
        let domainRing;
        let isPurpleActive = false;
        isExploding = false;
        let handOpenDetected = false;
        let lastHandOpenState = false;
        
        // Setup Scene
        const scene = new THREE.Scene();
        scene.background = null;
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 2.5;
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('output_canvas'), 
            alpha: true,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);

        // Post Processing
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.8);
        
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- TEXTURE ---
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(200,200,255,0.9)');
            gradient.addColorStop(0.6, 'rgba(160,32,240,0.5)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            
            const texture = new THREE.Texture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const particleTexture = createParticleTexture();

        // --- BACKGROUND STARS ---
        function createBackgroundStars() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 300; i++) {
                const r = 2 + Math.random() * 6;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x88AAFF,
                size: 0.015,
                transparent: true,
                opacity: 0.1,
                blending: THREE.AdditiveBlending
            });
            
            return new THREE.Points(geometry, material);
        }

        const stars = createBackgroundStars();
        scene.add(stars);

        // --- ENERGY SPHERE (MERAH & BIRU) ---
        function createEnergySphere(color, isRed = true) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const radius = 0.22;
            
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const r = radius * Math.pow(Math.random(), 1.3);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: color,
                size: 0.045,
                map: particleTexture,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const sphere = new THREE.Points(geometry, material);
            sphere.visible = false;
            return sphere;
        }

        // --- PURPLE SPHERE (INTI) ---
        function createPurpleSphere() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const radius = 0.35;
            
            for (let i = 0; i < 2000; i++) {
                const r = radius * (0.7 + Math.random() * 0.3);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0xAA44FF,
                size: 0.06,
                map: particleTexture,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const sphere = new THREE.Points(geometry, material);
            sphere.visible = false;
            return sphere;
        }

        // --- PURPLE AURA (ENERGI DI SEKITAR) ---
        function createPurpleAura() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];
            
            for (let i = 0; i < CONFIG.auraParticleCount; i++) {
                // Posisi random di shell bola dengan radius lebih besar
                const r = 0.6 + Math.random() * 0.4;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
                
                // Velocity untuk rotasi
                velocities.push(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x8844CC,
                size: 0.04,
                map: particleTexture,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const aura = new THREE.Points(geometry, material);
            aura.userData = { velocities: velocities };
            aura.visible = false;
            return aura;
        }

        // --- HOLLOW PURPLE EXPLOSION ---
        function createHollowPurple() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];
            const colors = [];
            
            for (let i = 0; i < CONFIG.explosionParticles; i++) {
                positions.push(0, 0, 0);
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const speed = 0.03 + Math.random() * 0.15;
                
                velocities.push(
                    speed * Math.sin(phi) * Math.cos(theta),
                    speed * Math.sin(phi) * Math.sin(theta),
                    speed * Math.cos(phi)
                );
                
                // Warna gradien
                const mix = Math.random();
                let r, g, b;
                if (mix < 0.33) {
                    r = 1.0; g = 0.2; b = 0.3;
                } else if (mix < 0.66) {
                    r = 0.3; g = 0.4; b = 1.0;
                } else {
                    r = 0.8; g = 0.3; b = 1.0;
                }
                
                colors.push(r, g, b);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.07,
                map: particleTexture,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const system = new THREE.Points(geometry, material);
            system.userData = { 
                active: false, 
                time: 0,
                velocities: velocities
            };
            return system;
        }

        // --- DOMAIN RING ---
        function createDomainRing() {
            const geometry = new THREE.TorusGeometry(0.8, 0.02, 32, 100);
            const material = new THREE.MeshBasicMaterial({
                color: 0xAA44FF,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(geometry, material);
            ring.rotation.x = Math.PI / 2;
            ring.position.z = -0.3;
            return ring;
        }

        // Initialize objects
        redSphere = createEnergySphere(CONFIG.redColor, true);
        blueSphere = createEnergySphere(CONFIG.blueColor, false);
        purpleSphere = createPurpleSphere();
        purpleAura = createPurpleAura();
        purpleExplosion = createHollowPurple();
        domainRing = createDomainRing();
        
        scene.add(redSphere);
        scene.add(blueSphere);
        scene.add(purpleSphere);
        scene.add(purpleAura);
        scene.add(purpleExplosion);
        scene.add(domainRing);
        domainRing.visible = false;

        // --- MEDIAPIPE SETUP ---
        const createHandLandmarker = async () => {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2
                });
                document.getElementById("loading").style.display = "none";
                startWebcam();
            } catch (error) {
                console.error("Error:", error);
            }
        };

        const startWebcam = () => {
            const video = document.getElementById("webcam");
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    frameRate: { ideal: 30 }
                } 
            }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    webcamRunning = true;
                    predictWebcam();
                    
                    document.getElementById("cam-quality").innerHTML = 
                        '<span class="green-dot"></span> ' + 
                        video.videoWidth + 'x' + video.videoHeight;
                });
            }).catch(err => {
                console.error("Webcam error:", err);
            });
        };

        // Fungsi untuk deteksi tangan terbuka
        function isHandOpen(handLandmarks) {
            if (!handLandmarks) return false;
            
            // Ambil landmark ujung jari dan pangkal jari
            const thumbTip = handLandmarks[4];
            const indexTip = handLandmarks[8];
            const middleTip = handLandmarks[12];
            const ringTip = handLandmarks[16];
            const pinkyTip = handLandmarks[20];
            
            const wrist = handLandmarks[0];
            const indexMCP = handLandmarks[5];
            
            // Hitung jarak dari wrist ke ujung jari
            const distThumb = Math.sqrt(
                Math.pow(thumbTip.x - wrist.x, 2) + 
                Math.pow(thumbTip.y - wrist.y, 2)
            );
            const distIndex = Math.sqrt(
                Math.pow(indexTip.x - wrist.x, 2) + 
                Math.pow(indexTip.y - wrist.y, 2)
            );
            const distMiddle = Math.sqrt(
                Math.pow(middleTip.x - wrist.x, 2) + 
                Math.pow(middleTip.y - wrist.y, 2)
            );
            const distRing = Math.sqrt(
                Math.pow(ringTip.x - wrist.x, 2) + 
                Math.pow(ringTip.y - wrist.y, 2)
            );
            const distPinky = Math.sqrt(
                Math.pow(pinkyTip.x - wrist.x, 2) + 
                Math.pow(pinkyTip.y - wrist.y, 2)
            );
            
            // Tangan terbuka jika semua jari terentang (jarak cukup besar)
            const avgDist = (distThumb + distIndex + distMiddle + distRing + distPinky) / 5;
            return avgDist > 0.3; // Threshold deteksi tangan terbuka
        }

        // --- MAIN LOOP ---
        async function predictWebcam() {
            const video = document.getElementById("webcam");
            if (!webcamRunning || !video) return;
            
            let startTimeMs = performance.now();
            
            if (lastVideoTime !== video.currentTime && handLandmarker) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                if (results.landmarks.length > 0) {
                    // Deteksi tangan terbuka untuk trigger ledakan
                    handOpenDetected = false;
                    for (let i = 0; i < results.landmarks.length; i++) {
                        if (isHandOpen(results.landmarks[i])) {
                            handOpenDetected = true;
                            break;
                        }
                    }
                    
                    // Trigger ledakan jika tangan terbuka dan purple aktif
                    if (handOpenDetected && isPurpleActive && !isExploding) {
                        triggerHollowPurple(purpleSphere.position.clone());
                    }
                    
                    // Update status
                    if (handOpenDetected) {
                        document.getElementById("status").innerHTML = '<span>✋</span> OPEN PALM DETECTED · READY TO RELEASE';
                    } else if (isPurpleActive) {
                        document.getElementById("status").innerHTML = '<span>🟣</span> HOLLOW PURPLE ACTIVE · OPEN PALM TO RELEASE';
                    }
                }

                // Logic untuk membuat Hollow Purple
                if (results.landmarks.length === 2 && !isPurpleActive && !isExploding) {
                    const handA = results.landmarks[0][8];
                    const handB = results.landmarks[1][8];
                    
                    const aspect = window.innerWidth / window.innerHeight;
                    const fovFactor = Math.tan((camera.fov / 2) * (Math.PI / 180)) * 2;
                    
                    const posA = new THREE.Vector3(
                        (handA.x - 0.5) * -1 * aspect * fovFactor * 2.2,
                        (handA.y - 0.5) * -1 * fovFactor * 2.2,
                        0
                    );
                    
                    const posB = new THREE.Vector3(
                        (handB.x - 0.5) * -1 * aspect * fovFactor * 2.2,
                        (handB.y - 0.5) * -1 * fovFactor * 2.2,
                        0
                    );

                    const dist = posA.distanceTo(posB);

                    // Update red & blue spheres
                    redSphere.position.copy(posA);
                    blueSphere.position.copy(posB);
                    redSphere.visible = true;
                    blueSphere.visible = true;
                    
                    redSphere.rotation.y += 0.03;
                    blueSphere.rotation.y -= 0.03;

                    // Create Hollow Purple when close
                    if (dist < CONFIG.mergeDistance) {
                        createHollowPurpleSphere(posA.clone().add(posB).multiplyScalar(0.5));
                    }
                } else if (results.landmarks.length < 2 && !isPurpleActive && !isExploding) {
                    redSphere.visible = false;
                    blueSphere.visible = false;
                }
            }

            // Animate Purple Aura
            if (isPurpleActive && purpleAura.visible) {
                const positions = purpleAura.geometry.attributes.position.array;
                const velocities = purpleAura.userData.velocities;
                
                for (let i = 0; i < positions.length; i += 3) {
                    // Rotasi aura
                    positions[i] += velocities[i] * 0.5;
                    positions[i+1] += velocities[i+1] * 0.5;
                    positions[i+2] += velocities[i+2] * 0.5;
                    
                    // Keep within shell
                    const x = positions[i] - purpleSphere.position.x;
                    const y = positions[i+1] - purpleSphere.position.y;
                    const z = positions[i+2] - purpleSphere.position.z;
                    const dist = Math.sqrt(x*x + y*y + z*z);
                    
                    if (dist > 1.0 || dist < 0.5) {
                        // Reset position if out of bounds
                        const angle1 = Math.random() * Math.PI * 2;
                        const angle2 = Math.acos(2 * Math.random() - 1);
                        const r = 0.7 + Math.random() * 0.3;
                        
                        positions[i] = purpleSphere.position.x + r * Math.sin(angle2) * Math.cos(angle1);
                        positions[i+1] = purpleSphere.position.y + r * Math.sin(angle2) * Math.sin(angle1);
                        positions[i+2] = purpleSphere.position.z + r * Math.cos(angle2);
                    }
                }
                
                purpleAura.geometry.attributes.position.needsUpdate = true;
                purpleSphere.rotation.y += 0.02;
                purpleSphere.rotation.x += 0.01;
            }

            // Animate explosion
            if (isExploding) {
                animateExplosion();
            }

            // Animate domain ring
            if (domainRing.visible) {
                domainRing.rotation.z += 0.01;
                domainRing.rotation.y += 0.005;
                domainRing.scale.setScalar(1 + Math.sin(Date.now() * 0.005) * 0.1);
            }

            stars.rotation.y += 0.0005;

            composer.render();
            window.requestAnimationFrame(predictWebcam);
        }

        function createHollowPurpleSphere(position) {
            isPurpleActive = true;
            
            redSphere.visible = false;
            blueSphere.visible = false;
            
            purpleSphere.position.copy(position);
            purpleAura.position.copy(position);
            
            purpleSphere.visible = true;
            purpleAura.visible = true;
            domainRing.visible = true;
            
            document.getElementById("status").innerHTML = '<span>🟣</span> HOLLOW PURPLE CREATED · OPEN PALM TO RELEASE';
        }

        function triggerHollowPurple(position) {
            isExploding = true;
            isPurpleActive = false;
            
            purpleSphere.visible = false;
            purpleAura.visible = false;
            
            purpleExplosion.position.copy(position);
            purpleExplosion.userData.active = true;
            purpleExplosion.userData.time = 0;
            
            // Reset explosion particles
            const positions = purpleExplosion.geometry.attributes.position.array;
            for(let i = 0; i < positions.length; i++) {
                positions[i] = 0;
            }
            purpleExplosion.geometry.attributes.position.needsUpdate = true;
            
            document.getElementById("status").innerHTML = '<span>⚡</span> HOLLOW PURPLE · IMAGINARY TECHNIQUE: VOID';
        }

        function animateExplosion() {
            const positions = purpleExplosion.geometry.attributes.position.array;
            const velocities = purpleExplosion.userData.velocities;
            
            purpleExplosion.userData.time += 0.016;
            const time = purpleExplosion.userData.time;
            
            for (let i = 0; i < positions.length; i += 3) {
                positions[i] += velocities[i] * (1 + time * 0.5);
                positions[i+1] += velocities[i+1] * (1 + time * 0.5);
                positions[i+2] += velocities[i+2] * (1 + time * 0.5);
            }
            
            purpleExplosion.geometry.attributes.position.needsUpdate = true;
            purpleExplosion.material.opacity = Math.max(0, 1 - time * 0.6);
            domainRing.material.opacity = Math.max(0, 0.25 - time * 0.1);

            if (time > 2.0) {
                isExploding = false;
                domainRing.visible = false;
                purpleExplosion.material.opacity = 1;
                purpleExplosion.userData.active = false;
                document.getElementById("status").innerHTML = '<span>◉</span> BRING FINGERS TOGETHER TO CREATE HOLLOW PURPLE';
            }
        }

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        createHandLandmarker();
    </script>
</body>
</html>
